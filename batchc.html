<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACC Batch Completed</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:'Orbitron',sans-serif;
position:relative;
}

.grid{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(rgba(255,0,0,.06) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,102,255,.06) 1px,transparent 1px);
background-size:70px 70px;
animation:gridMove 12s linear infinite;
}

@keyframes gridMove{
0%{transform:translateY(0);}
100%{transform:translateY(70px);}
}

.content{
position:relative;
z-index:5;
text-align:center;
padding:20px;
animation:float 4s ease-in-out infinite;
max-width:1000px;
}

@keyframes float{
50%{
transform:translateY(-12px);
}
}

.icon{
font-size:110px;
margin-bottom:25px;
color:#fff;
text-shadow:
0 0 15px #ff0000,
0 0 35px #ff0000,
0 0 70px #0066ff;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.12);
}
}

h1{
font-size:clamp(40px,7vw,90px);
font-weight:900;
line-height:1.1;
background:linear-gradient(90deg,#ff0000,#ffffff,#0066ff);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 5s linear infinite;
text-transform:uppercase;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.message{
margin-top:30px;
font-family:'Rajdhani',sans-serif;
font-size:clamp(22px,2.5vw,34px);
font-weight:700;
color:#ffffff;
line-height:1.7;
text-shadow:
0 0 12px #0066ff,
0 0 25px rgba(0,102,255,.8);
}

.motto{
margin-top:35px;
font-family:'Rajdhani',sans-serif;
font-size:clamp(18px,2vw,26px);
font-weight:700;
letter-spacing:3px;
color:#ffffff;
text-transform:uppercase;
text-shadow:
0 0 10px #ffffff,
0 0 20px #0066ff,
0 0 35px #ff0000;
animation:glowText 3s ease-in-out infinite alternate;
}

@keyframes glowText{
from{
filter:brightness(1);
}
to{
filter:brightness(1.5);
}
}

.admin{
margin-top:40px;
font-size:12px;
letter-spacing:3px;
font-weight:700;
color:#ff2222;
text-transform:uppercase;
text-shadow:
0 0 15px #ff0000,
0 0 35px #ff0000,
0 0 60px #ff0000;
animation:blink 2s infinite;
}

@keyframes blink{
50%{
opacity:.7;
}
}

.scan-line{
position:absolute;
top:-100%;
left:0;
width:100%;
height:180px;
background:linear-gradient(
to bottom,
transparent,
rgba(255,255,255,.12),
transparent
);
animation:scan 5s linear infinite;
pointer-events:none;
}

@keyframes scan{
100%{
top:120%;
}
}

.particles{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.particles span{
position:absolute;
display:block;
border-radius:50%;
opacity:.8;
animation:fall linear infinite;
}

.particles span:nth-child(1){
left:5%;
width:5px;
height:5px;
background:#ff0000;
box-shadow:0 0 15px #ff0000;
animation-duration:7s;
}

.particles span:nth-child(2){
left:15%;
width:4px;
height:4px;
background:#0066ff;
box-shadow:0 0 15px #0066ff;
animation-duration:10s;
}

.particles span:nth-child(3){
left:28%;
width:6px;
height:6px;
background:#ff0000;
box-shadow:0 0 20px #ff0000;
animation-duration:8s;
}

.particles span:nth-child(4){
left:40%;
width:4px;
height:4px;
background:#0066ff;
box-shadow:0 0 20px #0066ff;
animation-duration:11s;
}

.particles span:nth-child(5){
left:52%;
width:5px;
height:5px;
background:#ff0000;
box-shadow:0 0 18px #ff0000;
animation-duration:9s;
}

.particles span:nth-child(6){
left:65%;
width:4px;
height:4px;
background:#0066ff;
box-shadow:0 0 18px #0066ff;
animation-duration:12s;
}

.particles span:nth-child(7){
left:80%;
width:6px;
height:6px;
background:#ff0000;
box-shadow:0 0 20px #ff0000;
animation-duration:8s;
}

.particles span:nth-child(8){
left:92%;
width:5px;
height:5px;
background:#0066ff;
box-shadow:0 0 20px #0066ff;
animation-duration:10s;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>
<body>

<div class="grid"></div>

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="scan-line"></div>

<div class="content">

<div class="icon">⚠</div>

<h1>Batch Completed</h1>

<div class="message">
The Batch has completed,there are no boxes right now......<br><br>
Thanks for staying with ACC... ...
</div>

<div class="motto">
— Admin Panel —
</div>

<div class="admin">

  We Observe In Silence,Strike In Precision
</div>

</div>

</body>
</html>
